server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers. CSP is deliberately strict: the only network origins
    # we need are same-origin (for /api) and *.amazonaws.com (for presigned S3 PUTs/GETs).
    add_header X-Content-Type-Options        "nosniff" always;
    add_header X-Frame-Options               "DENY" always;
    add_header Referrer-Policy               "no-referrer" always;
    add_header Permissions-Policy            "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy    "same-origin" always;
    add_header Cross-Origin-Embedder-Policy  "require-corp" always;
    add_header Content-Security-Policy       "default-src 'self'; img-src 'self' data:; connect-src 'self' https://*.amazonaws.com; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # Client-side routing: send every unknown path to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check for the K8s Deployment probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Don't cache the index; do cache hashed assets aggressively.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
