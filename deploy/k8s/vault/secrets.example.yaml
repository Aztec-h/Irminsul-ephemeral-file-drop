# Copy to deploy/k8s/vault/secrets.yaml (git-ignored) or, preferably, have
# Jenkins pull these from AWS SSM Parameter Store at deploy time.
apiVersion: v1
kind: Secret
metadata:
  name: vault-secrets
  namespace: irminsul
type: Opaque
stringData:
  # postgres://user:pass@host:5432/db?sslmode=require
  DATABASE_URL: "REPLACE_ME"
  # 32+ random bytes, base64. openssl rand -base64 48
  JWT_SECRET: "REPLACE_ME"
