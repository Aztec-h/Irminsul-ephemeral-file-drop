apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-allow-ingress
  namespace: irminsul
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# Vault must reach RDS (in the VPC), S3 (public AWS IPs), and IMDS (169.254.169.254)
# for instance-profile credentials on k3s. When switching to IRSA, re-add the IMDS block.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-allow-egress
  namespace: irminsul
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Egress
  egress:
    # IMDS for AWS credentials (instance profile)
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
    # S3, RDS, and other AWS services
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
