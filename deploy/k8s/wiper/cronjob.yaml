apiVersion: batch/v1
kind: CronJob
metadata:
  name: wiper
  namespace: irminsul
  labels:
    app.kubernetes.io/name: wiper
    app.kubernetes.io/part-of: irminsul
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: wiper
        spec:
          serviceAccountName: wiper
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: wiper
              image: 465532803709.dkr.ecr.us-east-1.amazonaws.com/irminsul/wiper:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: vault-config
                - secretRef:
                    name: vault-secrets
              env:
                - name: BATCH_SIZE
                  value: "200"
              resources:
                requests:
                  cpu: "25m"
                  memory: "48Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
