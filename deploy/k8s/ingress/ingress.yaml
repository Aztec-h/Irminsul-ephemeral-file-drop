apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: irminsul
  namespace: irminsul
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false" # ALB already did TLS
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "120m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: frontend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
