---
- name: Ensure hostname is set from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Update all packages (AL2023)
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true
  when: ansible_facts['os_family'] == 'RedHat'
  register: dnf_update
  retries: 3
  delay: 10
  until: dnf_update is succeeded

- name: Install baseline utilities
  ansible.builtin.dnf:
    name:
      - tar
      - unzip
      - jq
      - vim
      - htop
      - chrony
#      - fail2ban
      - audit
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Enable and start chrony (time sync)
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true

- name: Enable and start auditd
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: restart sshd

- name: Disable password SSH auth (keys only)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: restart sshd

- name: Harden SSH ciphers
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config.d/99-irminsul-hardening.conf
    create: true
    mode: "0644"
    block: |
      Protocol 2
      ClientAliveInterval 300
      ClientAliveCountMax 2
      MaxAuthTries 4
      LoginGraceTime 30
      X11Forwarding no
      AllowTcpForwarding no
      KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
  notify: restart sshd

- name: Kernel hardening sysctls
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_set: true
  loop:
    - { key: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { key: "net.ipv4.conf.default.rp_filter", value: "1" }
    - { key: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
    - { key: "net.ipv4.conf.all.accept_source_route", value: "0" }
    - { key: "net.ipv4.conf.all.log_martians", value: "1" }
    - { key: "kernel.randomize_va_space", value: "2" }
    - { key: "net.ipv4.tcp_syncookies", value: "1" }
    - { key: "fs.protected_hardlinks", value: "1" }
    - { key: "fs.protected_symlinks", value: "1" }

